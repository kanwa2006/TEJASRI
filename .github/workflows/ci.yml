name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy strict)
        run: mypy src

      - name: Unit tests
        run: pytest -m "not integration" -q

  integration:
    name: Backend — integration tests (CockroachDB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Start single-node CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 \
            cockroachdb/cockroach:latest-v25.2 start-single-node --insecure
          for i in $(seq 1 30); do
            docker exec crdb ./cockroach sql --insecure -e "SELECT 1" && break
            sleep 2
          done

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://root@localhost:26257/defaultdb?sslmode=disable
        run: pytest -m integration -q

  frontend:
    name: Frontend — types and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check and build
        run: npm run build
